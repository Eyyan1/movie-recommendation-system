# Application
spring.application.name=movie-recommendation
server.port=${SERVER_PORT:8080}

# Thymeleaf
spring.thymeleaf.cache=false

# PostgreSQL datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/movie_rec}
spring.datasource.username=${DB_USERNAME:movie_user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SQL initialization
spring.sql.init.mode=never

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO

# TMDb
tmdb.base-url=https://api.themoviedb.org
tmdb.api-version=3
tmdb.read-access-token=${TMDB_READ_ACCESS_TOKEN:}
tmdb.image-base-url=https://image.tmdb.org/t/p
tmdb.poster-size=w500
tmdb.language=en-US
