<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Application Error')}"></th:block>
</head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: flash-messages}"></div>

<main class="container py-5">
    <div class="card shadow-sm border-0">
        <div class="card-body p-5 text-center">
            <div class="text-secondary mb-2">Error <span th:text="${status}">500</span></div>
            <h1 class="display-6 mb-3"
                th:text="${status == 404 ? 'Page Not Found' : (status == 403 ? 'Access Denied' : 'Something Went Wrong')}">
                Something Went Wrong
            </h1>
            <p class="text-secondary mb-4"
               th:text="${status == 404 ? 'The page you are looking for does not exist or has moved.' : (status == 403 ? 'You do not have permission to view this page.' : 'An unexpected error occurred while processing your request.')}">
                An unexpected error occurred while processing your request.
            </p>
            <div class="d-flex justify-content-center gap-2">
                <a class="btn btn-primary" th:href="@{/}">Go Home</a>
                <a class="btn btn-outline-secondary" th:href="@{/movies}">Browse Movies</a>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
