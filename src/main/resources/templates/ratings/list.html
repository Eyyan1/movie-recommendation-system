<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/layout :: head('My Ratings')}"></th:block>
</head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: flash-messages}"></div>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h1 class="h2 mb-1">My Ratings</h1>
            <p class="text-secondary mb-0">Movies you have already rated.</p>
        </div>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(ratings)}">
        You have not rated any movies yet.
    </div>

    <div class="row g-4" th:if="${not #lists.isEmpty(ratings)}">
        <div class="col-md-6 col-xl-4" th:each="rating : ${ratings}">
            <div class="card h-100 shadow-sm border-0">
                <img th:if="${rating.movie.posterUrl != null and !#strings.isEmpty(rating.movie.posterUrl)}"
                     th:src="${rating.movie.posterUrl}"
                     th:alt="${rating.movie.title}"
                     class="card-img-top"
                     style="height: 360px; object-fit: cover;">
                <div th:if="${rating.movie.posterUrl == null or #strings.isEmpty(rating.movie.posterUrl)}"
                     class="bg-secondary-subtle d-flex align-items-center justify-content-center text-secondary"
                     style="height: 360px;">
                    Poster unavailable
                </div>
                <div class="card-body d-flex flex-column">
                    <h2 class="h5 card-title mb-2" th:text="${rating.movie.title}">Movie Title</h2>
                    <div class="mb-3">
                        <span class="badge text-bg-dark me-1 mb-1"
                              th:each="genre : ${rating.movie.genres}"
                              th:text="${genre.name}">Genre</span>
                    </div>
                    <p class="mb-2">
                        Your rating:
                        <strong th:text="${rating.ratingValue}">5</strong>/5
                    </p>
                    <p class="text-secondary mb-4">
                        Updated:
                        <span th:text="${rating.updatedAt}">2026-01-01T00:00</span>
                    </p>
                    <a class="btn btn-outline-primary mt-auto" th:href="@{/movies/{id}(id=${rating.movie.id})}">View movie</a>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
