<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/layout :: head('Movie Recommendation')}"></th:block>
</head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: flash-messages}"></div>

<main class="container py-5">
    <div class="p-5 mb-4 bg-white rounded-3 shadow-sm border">
        <div class="container-fluid py-3">
            <h1 class="display-6 fw-bold">Movie recommendation website</h1>
            <p class="col-md-8 fs-5 text-secondary mb-4">
                The project foundation is ready. Registration and login are now wired with Spring Security,
                session-based authentication, and PostgreSQL-backed users.
            </p>
            <div class="d-flex gap-2">
                <a class="btn btn-primary" th:href="@{/register}">Create account</a>
                <a class="btn btn-outline-secondary" th:href="@{/login}">Sign in</a>
            </div>
        </div>
    </div>
    <div class="alert alert-info mb-0">
        Next, we can build movie browsing and rating features on top of this auth setup.
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
