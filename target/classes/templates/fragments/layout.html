<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Movie Recommendation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Movie Recommendation</a>
        <div class="navbar-nav ms-auto d-flex flex-row flex-wrap align-items-center gap-2">
            <a class="nav-link text-white" th:href="@{/}">Home</a>
            <a class="nav-link text-white" th:href="@{/movies}">Movies</a>
            <a class="nav-link text-white" th:href="@{/recommendations}" sec:authorize="isAuthenticated()">Recommendations</a>
            <a class="nav-link text-white" th:href="@{/my-ratings}" sec:authorize="isAuthenticated()">My Ratings</a>
            <a class="nav-link text-white" th:href="@{/admin/movies}" sec:authorize="hasRole('ADMIN')">Admin Movies</a>
            <span class="navbar-text text-white-50 me-1" sec:authorize="isAuthenticated()">
                Signed in as <strong class="text-white" sec:authentication="name">username</strong>
            </span>
            <a class="btn btn-outline-light btn-sm" th:href="@{/login}" sec:authorize="isAnonymous()">Login</a>
            <a class="btn btn-warning btn-sm" th:href="@{/register}" sec:authorize="isAnonymous()">Register</a>
            <form th:action="@{/logout}" method="post" class="d-inline" sec:authorize="isAuthenticated()">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div th:fragment="flash-messages" class="container pt-4">
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-success" th:if="${registrationSuccess}" th:text="${registrationSuccess}"></div>
    <div class="alert alert-success" th:if="${ratingSuccess}" th:text="${ratingSuccess}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <div class="alert alert-danger" th:if="${registrationError}" th:text="${registrationError}"></div>
    <div class="alert alert-danger" th:if="${ratingError}" th:text="${ratingError}"></div>
</div>

<footer th:fragment="footer" class="border-top bg-white mt-5">
    <div class="container py-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
        <p class="mb-0 text-secondary">Movie Recommendation Website MVP</p>
        <p class="mb-0 text-secondary">Spring Boot, Thymeleaf, PostgreSQL</p>
    </div>
</footer>
</body>
</html>
