<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/layout :: head('Browse Movies')}"></th:block>
</head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: flash-messages}"></div>

<main class="container py-4">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-end gap-3 mb-4">
        <div>
            <h1 class="h2 mb-1">Browse Movies</h1>
            <p class="text-secondary mb-0">Search by title, filter by genre, or combine both.</p>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form th:action="@{/movies}" method="get" class="row g-3 align-items-end">
                <div class="col-md-6">
                    <label for="q" class="form-label">Search title</label>
                    <input id="q" name="q" type="text" class="form-control" th:value="${currentQuery}" placeholder="Try Batman">
                </div>
                <div class="col-md-4">
                    <label for="genre" class="form-label">Genre</label>
                    <select id="genre" name="genre" class="form-select">
                        <option value="">All genres</option>
                        <option th:each="genreOption : ${genres}"
                                th:value="${genreOption.name}"
                                th:text="${genreOption.name}"
                                th:selected="${genreOption.name == currentGenre}">
                        </option>
                    </select>
                </div>
                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-primary">Apply</button>
                </div>
            </form>
        </div>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(movies)}">
        No movies matched your current search and filter.
    </div>

    <div class="row g-4" th:if="${not #lists.isEmpty(movies)}">
        <div class="col-md-6 col-xl-4" th:each="movie : ${movies}">
            <div class="card h-100 shadow-sm border-0">
                <img th:if="${movie.posterUrl != null and !#strings.isEmpty(movie.posterUrl)}"
                     th:src="${movie.posterUrl}"
                     th:alt="${movie.title}"
                     class="card-img-top"
                     style="height: 420px; object-fit: cover;">
                <div th:if="${movie.posterUrl == null or #strings.isEmpty(movie.posterUrl)}"
                     class="bg-secondary-subtle d-flex align-items-center justify-content-center text-secondary"
                     style="height: 420px;">
                    Poster unavailable
                </div>
                <div class="card-body d-flex flex-column">
                    <h2 class="h5 card-title mb-2" th:text="${movie.title}">Movie Title</h2>
                    <div class="mb-3">
                        <span class="badge text-bg-dark me-1 mb-1"
                              th:each="genre : ${movie.genres}"
                              th:text="${genre.name}">Genre</span>
                    </div>
                    <p class="text-secondary mb-2">
                        Release date:
                        <span th:text="${movie.releaseDate != null ? movie.releaseDate : 'Unknown'}">Unknown</span>
                    </p>
                    <p class="text-secondary mb-4">
                        Average rating:
                        <span th:text="${movie.averageRating != null ? movie.averageRating : 'N/A'}">N/A</span>
                    </p>
                    <a class="btn btn-outline-primary mt-auto" th:href="@{/movies/{id}(id=${movie.id})}">View details</a>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
