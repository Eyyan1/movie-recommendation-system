<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Page Not Found')}"></th:block>
</head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: flash-messages}"></div>

<main class="container py-5">
    <div class="card shadow-sm border-0">
        <div class="card-body p-5 text-center">
            <div class="text-secondary mb-2">Error 404</div>
            <h1 class="display-6 mb-3">Page Not Found</h1>
            <p class="text-secondary mb-4">
                The page you are looking for does not exist or has moved.
            </p>
            <div class="d-flex justify-content-center gap-2">
                <a class="btn btn-primary" th:href="@{/}">Go Home</a>
                <a class="btn btn-outline-secondary" th:href="@{/movies}">Browse Movies</a>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
